# .github/workflows/gha_stt_assault.yml
name: GHA STT Assault (第一棒重裝消化特遣隊)

on:
  schedule:
    - cron: '23 */12 * * *' # 🚀 修正：每 12 小時的第 23 分鐘啟動 (如 00:23, 12:23)
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊啟動

jobs:
  stt_assault_mission:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # 強制撤離防線：若執行超過 40 分鐘，GitHub 將自動終止任務

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 加速後續的套件安裝

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Execute GHA STT Mission
      env:
        WORKER_ID: "AUDIO_EAT"
        MEMORY_TIER: "512"
        MISSION_MODE: "ALL"   # 🚀 這裡可改為 "AUDIO" 或 "SUMMARY" 進行單獨測試
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} 
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} 
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        python gha_stt_mission.py