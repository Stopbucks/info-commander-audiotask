# ---------------------------------------------------------
# S-Plan Fortress: GHA STT Assault v5.8 (重裝吞噬特遣隊)
# [任務] 接替 DBOS 退休空缺，擔任全軍第一棒「純壓縮」兵工廠。
# [更新] 1. 高頻打擊：改為每 4 小時啟動一次。
# [更新] 2. 產能倍增：STT_LIMIT 提升至 10 筆，專攻巨型音檔壓縮。
# [更新] 3. 戰線拉長：撤退時限提升至 70 分鐘，對應 YAML 寬限期至 90 分鐘。
# ---------------------------------------------------------
name: GHA STT Assault (V5.8 重裝吞噬特遣隊)

on:
  schedule:
    # 🚀 戰術修正：每 4 小時的第 23 分鐘啟動 (如 00:23, 04:23, 08:23...)
    - cron: '23 */4 * * *'
  workflow_dispatch: # 允許手動強制啟動

jobs:
  stt_assault_mission:
    runs-on: ubuntu-latest
    # 🛡️ 安全極限：配合 control.py 的 70 分鐘設定，放寬至 90 分鐘防止遭 GitHub 誤殺
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Execute GHA STT Mission
      env:
        WORKER_ID: "AUDIO_EAT"
        MEMORY_TIER: "1024"  # 🚀 同步升級記憶體階級
        MISSION_MODE: "ALL"
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} 
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} 
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        python gha_stt_mission.py
